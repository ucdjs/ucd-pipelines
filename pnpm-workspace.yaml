ignoreScripts: true
minimumReleaseAge: 5760
trustPolicy: no-downgrade
catalogMode: prefer
strictDepBuilds: true
blockExoticSubdeps: true

overrides:
  undici-types: 6.24.0

minimumReleaseAgeExclude:
  - "@ucdjs/*"
  - "@ucdjs-internal/*"
  - "@unicode-utils/*"

catalogs:
  dev:
    oxfmt: 0.43.0
    oxlint: 1.58.0
    oxlint-tsgolint: 0.19.0
    publint: 0.3.18
    tsdown: 0.21.7
    typescript: 6.0.2

  pipelines:
    "@ucdjs/pipeline-core": 0.0.1-beta.9
    "@ucdjs/fs-backend": 0.1.0-beta.3
    "@ucdjs/cli": 0.3.1-beta.11

  types:
    "@types/node": 22.19.14
